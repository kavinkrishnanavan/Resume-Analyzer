<!DOCTYPE html>
<html>
<head>
  <title>ATS Resume Analyzer</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 140px; margin-bottom: 10px; }
    button { margin: 5px; padding: 10px; }
    table { border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    .pass { color: green; }
    .fail { color: red; }
    #enhanced { white-space: pre-wrap; background:#f4f4f4; padding:10px; }
  </style>
</head>
<body>

<h2>Resume Analyzer</h2>

<textarea id="resume" placeholder="Paste resume..."></textarea>
<textarea id="job" placeholder="Paste job description..."></textarea>

<button onclick="analyze()">Analyze</button>
<button onclick="enhance()">Enhance Resume</button>

<div id="output"></div>

<h3>Enhanced Resume</h3>
<div id="enhanced"></div>

<script>
async function streamRequest(prompt, onChunk, onDone) {
  const res = await fetch("/.netlify/functions/openrouter", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });

    const lines = buffer.split("\n");
    buffer = lines.pop();

    for (const line of lines) {
      if (line.startsWith("data: ")) {
        const data = line.replace("data: ", "").trim();

        if (data === "[DONE]") {
          onDone();
          return;
        }

        try {
          const json = JSON.parse(data);
          const content = json.choices?.[0]?.delta?.content;
          if (content) onChunk(content);
        } catch {}
      }
    }
  }
}

/* ================= ANALYZE ================= */
function analyze() {
  const resume = document.getElementById("resume").value.slice(0, 4000);
  const job = document.getElementById("job").value.slice(0, 2000);

  const prompt = `
Return ONLY JSON with scores (0-100).

Factors:
innovation, strategic thinking, high quality, competitive, proactively, judgment, job level match, measurable results, paragraph length, resume tone, web presence, font check layout, page setup, contact information, summary, section headings, job title match, date formatting, education match, engagement, technical, content, design, multi-platform, product development, product lifecycle management, product planning

You may add new factors.

Job:
${job}

Resume:
${resume}
`;

  let full = "";

  document.getElementById("output").innerHTML = "Analyzing...";

  streamRequest(prompt,
    chunk => full += chunk,
    () => {
      try {
        const scores = JSON.parse(full);

        let rows = "";
        let total = 0, count = 0;

        for (const k in scores) {
          const v = scores[k];
          const pass = v >= 70;
          total += v; count++;

          rows += `
            <tr class="${pass ? 'pass':'fail'}">
              <td>${pass ? "✔️" : "❌"}</td>
              <td>${k}</td>
              <td>${v}%</td>
            </tr>`;
        }

        const overall = Math.round(total / count);

        document.getElementById("output").innerHTML = `
          <div style="display:flex; gap:30px;">
            <table>
              <tr><th>Status</th><th>Factor</th><th>Score</th></tr>
              ${rows}
            </table>
            <div style="font-size:28px;font-weight:bold;">
              Overall<br>${overall}%
            </div>
          </div>
        `;
      } catch {
        document.getElementById("output").innerText = full;
      }
    }
  );
}

/* ================= ENHANCE ================= */
function enhance() {
  const resume = document.getElementById("resume").value.slice(0, 4000);
  const job = document.getElementById("job").value.slice(0, 2000);

  const prompt = `
Rewrite and improve the resume for maximum ATS score.

- Add measurable results
- Improve clarity
- Match job keywords strongly
- Keep professional format
- RETURN ONLY FINAL RESUME TEXT

Job:
${job}

Resume:
${resume}
`;

  const out = document.getElementById("enhanced");
  out.textContent = "";

  streamRequest(prompt,
    chunk => out.textContent += chunk,
    () => {}
  );
}
</script>

</body>
</html>
