<!DOCTYPE html>
<html>
<head>
  <title>OpenRouter Test</title>
</head>
<body>
  <h2>Test OpenRouter via Netlify Function</h2>

  <input id="prompt" placeholder="Enter prompt" size="50" />
  <button onclick="send()">Send</button>

  <pre id="output"></pre>

  <script>
    async function send() {
      const prompt = document.getElementById("prompt").value;

      const res = await fetch("/.netlify/functions/openrouter", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      document.getElementById("output").textContent = data.output || JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
