<!DOCTYPE html>
<html>
<head>
  <title>Resume Analyzer</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 150px; margin-bottom: 10px; }
    button { padding: 10px; }
    pre { background: #f4f4f4; padding: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>

<h2>Resume Analyzer</h2>

<h4>Resume</h4>
<textarea id="resume" placeholder="Paste resume here..."></textarea>

<h4>Job Description</h4>
<textarea id="job" placeholder="Paste job description here..."></textarea>

<button onclick="analyze()">Analyze</button>
<button onclick="enhance()">Enhance Resume</button>
<h3>Enhanced Resume</h3>
<pre id="enhanced"></pre>

<pre id="output"></pre>

<script>
async function analyze() {
  const resume = document.getElementById("resume").value;
  const job = document.getElementById("job").value;

  const prompt = `
You are an advanced ATS + recruiter-level resume analyzer.

Evaluate the resume against the job description.
Return ONLY valid JSON with scores (0–100).

Base factors:
innovation, strategic thinking, high quality, competitive, proactively, judgment, job level match, measurable results, paragraph length, resume tone, web presence, font check layout, page setup, contact information, summary, section headings, job title match, date formatting, education match, engagement, technical, content, design, multi-platform, product development, product lifecycle management, product planning

You may add new relevant factors.

STRICT:
- JSON only
- no explanation

Job Description:
${job}

Resume:
${resume}
`;

  const res = await fetch("/.netlify/functions/openrouter", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  try {
    const scores = JSON.parse(data.output);

    let tableRows = "";
    let total = 0;
    let count = 0;

    for (const key in scores) {
      const value = scores[key];
      const pass = value >= 70;

      total += value;
      count++;

      tableRows += `
        <tr>
          <td>${pass ? "✔️" : "❌"}</td>
          <td>${key}</td>
          <td>${value}%</td>
        </tr>
      `;
    }

    const overall = Math.round(total / count);

    document.getElementById("output").innerHTML = `
      <div style="display:flex; gap:40px; align-items:flex-start;">
        
        <table border="1" cellpadding="8" cellspacing="0">
          <tr>
            <th>Status</th>
            <th>Factor</th>
            <th>Score</th>
          </tr>
          ${tableRows}
        </table>

        <div style="font-size:28px; font-weight:bold;">
          Overall Score<br>
          ${overall}%
        </div>

      </div>
    `;

  } catch (e) {
    document.getElementById("output").textContent = data.output;
  }
}
</script>
<script>
async function enhance() {
  const resume = document.getElementById("resume").value;
  const job = document.getElementById("job").value;

  const prompt = `
You are an expert ATS resume optimizer.

Rewrite and enhance the resume to achieve higher scores across:
innovation, strategic thinking, measurable results, technical strength, job match, and overall ATS compatibility.

STRICT RULES:
- Improve clarity, impact, and ATS keywords
- Add measurable results where possible
- Align strongly with the job description
- Keep it professional and concise
- DO NOT explain anything
- RETURN ONLY the improved resume text

Job Description:
${job}

Original Resume:
${resume}
`;

  const res = await fetch("/.netlify/functions/openrouter", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  document.getElementById("enhanced").textContent =
    data.output || "No response";
}
</script>
</body>
</html>
